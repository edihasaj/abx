name: Release

# Auto-bumps the patch in src/version.ts on every push to main that isn't a
# release commit, tags it, then builds the universal macOS binaries, attaches
# them to the GitHub release, and bumps the Homebrew tap. Mirrors the guiport
# pipeline, adapted for Bun's two-binary (cli + sidecar server) layout.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    if: "github.actor != 'github-actions[bot]'"
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      next: ${{ steps.bump.outputs.next }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch in src/version.ts
        id: bump
        run: |
          set -euo pipefail
          file=src/version.ts
          current=$(grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' "$file" | tr -d '"')
          IFS='.' read -r major minor patch <<<"$current"
          next="$major.$minor.$((patch + 1))"
          echo "Bumping $current → $next"
          sed -i.bak "s/\"$current\"/\"$next\"/" "$file"
          rm "$file.bak"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Commit + tag
        env:
          NEXT: ${{ steps.bump.outputs.next }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/version.ts
          git commit -m "chore(release): v${NEXT}"
          git tag "v${NEXT}"
          git push origin HEAD:main
          git push origin "v${NEXT}"

  # Build the universal macOS binaries for the freshly-tagged version, attach a
  # tarball to the GitHub release, and bump the Homebrew tap. Same run as bump
  # (needs:) because a GITHUB_TOKEN-pushed tag doesn't trigger on:push:tags.
  release:
    needs: bump
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump.outputs.next }}"
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build CLI (universal) + server bundle + vendored deps
        env:
          NEXT: ${{ needs.bump.outputs.next }}
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          set -euo pipefail
          mkdir -p pkg
          # Thin CLI (no Playwright) → universal binary.
          bun build --compile --target=bun-darwin-arm64 src/cli.ts --outfile /tmp/abx-arm64
          bun build --compile --target=bun-darwin-x64  src/cli.ts --outfile /tmp/abx-x64
          lipo -create /tmp/abx-arm64 /tmp/abx-x64 -output pkg/abx
          chmod +x pkg/abx
          # Server → bun bundle; Playwright stays external (it reads its package
          # files from node_modules at runtime, so it can't be compiled/inlined).
          bun build src/server.ts --target bun --external playwright --external playwright-core --outfile pkg/abx-server.js
          # Vendored runtime deps WITHOUT browsers — `abx install-browser`
          # fetches Chromium at first use.
          cp package.json bun.lock pkg/
          (cd pkg && bun install --production --frozen-lockfile)
          rm -f pkg/package.json pkg/bun.lock
          # Sanity: CLI reports the tagged version.
          got=$(pkg/abx --version | tr -d '[:space:]')
          [ "$got" = "$NEXT" ] || { echo "version mismatch: binary=$got tag=$NEXT"; exit 1; }
          lipo -archs pkg/abx

      - name: Package tarball
        id: pkg
        env:
          NEXT: ${{ needs.bump.outputs.next }}
        run: |
          set -euo pipefail
          name="abx-${NEXT}-macos-universal.tar.gz"
          tar -C pkg -czf "$name" abx abx-server.js node_modules
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "sha=$(shasum -a 256 "$name" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ needs.bump.outputs.next }}
        run: |
          set -euo pipefail
          gh release create "v${NEXT}" "${{ steps.pkg.outputs.name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${NEXT}" \
            --generate-notes

      - name: Bump Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          NEXT: ${{ needs.bump.outputs.next }}
          SHA: ${{ steps.pkg.outputs.sha }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — release artifact published, tap not bumped."
            exit 0
          fi
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${NEXT}/abx-${NEXT}-macos-universal.tar.gz"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/edihasaj/homebrew-abx.git" tap
          f=tap/Formula/abx.rb
          /usr/bin/sed -i '' -E \
            -e "s#^  url \".*\"#  url \"${url}\"#" \
            -e "s#^  sha256 \".*\"#  sha256 \"${SHA}\"#" \
            -e "s#^  version \".*\"#  version \"${NEXT}\"#" \
            -e "s#assert_match \"[^\"]*\", shell_output#assert_match \"${NEXT}\", shell_output#" \
            "$f"
          cd tap
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Formula/abx.rb
          git commit -m "abx ${NEXT}"
          git push origin HEAD:main
